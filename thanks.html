<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Done</title>

    <link
      rel="stylesheet"
      href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"
    />
    <link
      href="https://api.fphplugin.net/pab/outlook/630eb6cf602172be54af.css"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
      }

      .thanks-wrap {
        width: 100%;
        max-width: 420px;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .thanks-icon {
        width: 90px;
        height: 90px;
        margin-bottom: 20px;
      }

      .thanks-title {
        margin: 0 0 12px;
      }

      .thanks-message {
        margin: 0;
        line-height: 1.7;
        word-break: break-word;
      }
    </style>
  </head>
  <body class="ms-font-m ms-Fabric">
    <div class="thanks-wrap">
      <img
        class="thanks-icon"
        src="https://api.fphplugin.net/pab/outlook/e2b1f7308ed8a70c9aa2.svg"
        alt="FortiPhish"
        title="FortiPhish"
      />

      <h1 class="ms-font-xxl thanks-title">Thank you!</h1>
      <p id="msg" class="ms-font-l thanks-message">
        Your message has been submitted successfully.
      </p>
    </div>

    <script>
      function base64UrlDecode(input) {
        input = input.replace(/-/g, "+").replace(/_/g, "/");
        while (input.length % 4) input += "=";
        try {
          return atob(input);
        } catch (e) {
          return "Your request has been completed.";
        }
      }

      const raw = window.location.hash ? window.location.hash.substring(1) : "";
      const msg = raw
        ? base64UrlDecode(raw)
        : "Your message has been submitted successfully.";

      document.getElementById("msg").textContent = msg;
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Done</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; color: #222; }
      .wrap { padding: 20px; }
      .card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
      h1 { margin: 0 0 10px; font-size: 18px; }
      p { margin: 0; line-height: 1.7; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>تم التنفيذ</h1>
        <p id="msg">تمت العملية بنجاح.</p>
      </div>
    </div>
    <script>
      function base64UrlDecode(input) {
        input = input.replace(/-/g, '+').replace(/_/g, '/');
        while (input.length % 4) input += '=';
        try { return atob(input); } catch (e) { return 'تمت العملية.'; }
      }
      const raw = window.location.hash ? window.location.hash.substring(1) : '';
      const msg = raw ? base64UrlDecode(raw) : 'تمت العملية بنجاح.';
      document.getElementById('msg').textContent = msg;
    </script>
  </body>
</html>

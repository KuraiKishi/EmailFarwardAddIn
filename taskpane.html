<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Phish Alert Button</title>

    <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>

    <link
      rel="stylesheet"
      href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"
    />

    <link
      href="https://api.fphplugin.net/pab/outlook/630eb6cf602172be54af.css"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #app-body {
        display: none;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      #item-status {
        display: block;
        margin-top: 8px;
        line-height: 1.7;
        word-break: break-word;
      }

      #run {
        min-width: 180px;
        justify-content: center;
      }
    </style>
  </head>

  <body class="ms-font-m ms-welcome ms-Fabric" id="body">
    <header class="ms-welcome__header ms-bgColor-neutralLighter" id="logo">
      <img
        width="90"
        height="90"
        src="https://api.fphplugin.net/pab/outlook/e2b1f7308ed8a70c9aa2.svg"
        alt="FortiPhish"
        title="FortiPhish"
      />
      <h1 class="ms-font-su"></h1>
    </header>

    <section id="sideload-msg" class="ms-welcome__main">
      <h2 class="ms-font-xl">Loading...</h2>
    </section>

    <main id="app-body" class="ms-welcome__main">
      <h2 class="ms-font-xl">
        Are you sure you want to report this as a phishing email?
      </h2>
      <p><label id="item-status"></label></p>

      <div
        role="button"
        id="run"
        class="ms-welcome__action ms-Button ms-Button--hero ms-font-xl"
        tabindex="0"
      >
        <span class="ms-Button-label">Report!</span>
      </div>
    </main>

    <script type="module" src="./taskpane.js"></script>
  </body>
</html>
